<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,sans-serif; }
body { background:#000; color:white; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
#header { background:#1e1b4b; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
#header h1 { font-size:15px; font-weight:700; display:flex; align-items:center; gap:8px; }
#backBtn { background:rgba(255,255,255,0.15); border:none; color:white; padding:7px 16px; border-radius:20px; font-size:13px; cursor:pointer; }
#qr-reader { flex:1; width:100%; position:relative; overflow:hidden; }
#qr-reader video { width:100% !important; height:100% !important; object-fit:cover; position:absolute; inset:0; }
#qr-reader img, #qr-reader button, #qr-reader select, #qr-reader span { display:none !important; }
#overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; }
#scanbox { width:270px; height:170px; border:3px solid #6366f1; border-radius:14px; box-shadow:0 0 0 9999px rgba(0,0,0,0.5); position:relative; }
#scanline { position:absolute; left:6px; right:6px; height:2px; background:linear-gradient(90deg,transparent,#818cf8,transparent); animation:scan 1.8s linear infinite; top:4px; }
@keyframes scan { 0%{top:4px} 100%{top:calc(100% - 6px)} }
#hint { color:rgba(255,255,255,0.7); font-size:13px; margin-top:16px; text-align:center; }
#status { padding:12px 16px; text-align:center; font-size:14px; font-weight:500; background:#1e1b4b; min-height:48px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.3s; }
#status.error { background:#7f1d1d; }
#status.success { background:#14532d; }
#manual { background:#111827; padding:12px 16px; flex-shrink:0; }
#manual p { font-size:11px; color:#9ca3af; margin-bottom:6px; }
#manual .row { display:flex; gap:8px; }
#manual input { flex:1; background:#1f2937; border:1px solid #374151; color:white; border-radius:10px; padding:10px 12px; font-size:14px; outline:none; }
#manual input::placeholder { color:#6b7280; }
#manual button { background:#4f46e5; color:white; border:none; border-radius:10px; padding:10px 16px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; }
</style>
</head>
<body>

<div id="header">
  <h1>📷 Scan Barcode / QR</h1>
  <button id="backBtn">← Back</button>
</div>

<div id="qr-reader">
  <div id="overlay">
    <div id="scanbox"><div id="scanline"></div></div>
    <p id="hint">Align barcode within the frame</p>
  </div>
</div>

<div id="status">Initializing camera...</div>

<div id="manual">
  <p>Or enter manually:</p>
  <div class="row">
    <input type="text" id="manualInput" placeholder="Enter tracking number" autocomplete="off">
    <button id="manualBtn">Submit</button>
  </div>
  <div class="row" style="margin-top:8px;">
    <button id="captureBtn" style="background:#f59e0b; flex:1;">📸 Capture & Extract</button>
  </div>
</div>

<script>
// Get return URL from query param
var params = new URLSearchParams(window.location.search);
var returnURL = params.get('return') || document.referrer || '/';

function beep() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 1200; o.type = 'square';
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

function setStatus(msg, type) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = type || '';
}

function sendResult(text) {
  beep();
  setStatus('✓ Scanned: ' + text + ' — returning...', 'success');
  
  // Try to send result back to opener window
  if (window.opener) {
    try {
      window.opener.postMessage({ type: 'SCAN_RESULT', tracking: text }, '*');
    } catch(e) { console.log('postMessage failed:', e); }
  }
  
  // Also store in localStorage as backup
  try { localStorage.setItem('SCAN_RESULT', text); } catch(e){}
  
  setTimeout(function() {
    window.close();
  }, 900);
}

document.getElementById('backBtn').onclick = function() {
  if (scanner) scanner.stop().catch(function(){});
  window.close();
};

document.getElementById('manualBtn').onclick = function() {
  var val = document.getElementById('manualInput').value.trim();
  if (val) { if (scanner) scanner.stop().catch(function(){}); sendResult(val); }
};
document.getElementById('manualInput').onkeydown = function(e) {
  if (e.key === 'Enter') document.getElementById('manualBtn').click();
};

var scanner = new Html5Qrcode('qr-reader');
var lastScan = '', lastScanTime = 0;
var videoElement = null;

function extractTrackingNumber(text) {
  // Extract SD tracking numbers (e.g., SD000307079MA)
  var sdMatch = text.match(/SD\d+[A-Z]*/i);
  if (sdMatch) {
    console.log('Found SD match:', sdMatch[0]);
    return sdMatch[0].toUpperCase();
  }
  console.log('No SD match found in:', text);
  return null;
}

document.getElementById('captureBtn').onclick = function() {
  setStatus('Capturing image...', '');
  
  // Get video element from scanner
  var video = document.querySelector('#qr-reader video');
  if (!video) {
    setStatus('Camera not ready', 'error');
    return;
  }
  
  // Create canvas and capture frame
  var canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  var ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);
  
  setStatus('Extracting text from image...', '');
  
  // Use Tesseract to extract text
  Tesseract.recognize(canvas, 'eng', {
    logger: function(m) {
      if (m.status === 'recognizing') {
        var progress = Math.round(m.progress * 100);
        setStatus('Extracting: ' + progress + '%', '');
      }
    }
  }).then(function(result) {
    var text = result.data.text;
    console.log('OCR result:', text);
    
    var tracking = extractTrackingNumber(text);
    if (tracking) {
      console.log('Found tracking:', tracking);
      scanner.stop().catch(function(){});
      sendResult(tracking);
    } else {
      setStatus('No tracking number found. Try again or enter manually.', 'error');
    }
  }).catch(function(err) {
    console.error('OCR error:', err);
    setStatus('Error extracting text: ' + err.message, 'error');
  });
};

Html5Qrcode.getCameras().then(function(cameras) {
  if (!cameras || cameras.length === 0) { setStatus('No camera found.', 'error'); return; }
  var cam = cameras.find(function(c){ return /back|rear|environment/i.test(c.label); }) || cameras[cameras.length - 1];

  scanner.start(
    cam.id,
    { fps: 15, qrbox: { width: 270, height: 170 } },
    function(text) {
      var now = Date.now();
      if (text === lastScan && now - lastScanTime < 3000) return;
      lastScan = text; lastScanTime = now;
      scanner.stop().catch(function(){});
      sendResult(text);
    },
    function() {}
  ).then(function() { setStatus('Point camera at barcode...'); })
   .catch(function(err) { setStatus('Camera error: ' + err, 'error'); });

}).catch(function() {
  setStatus('Camera permission denied — use manual entry below.', 'error');
});
</script>
</body>
</html>
